services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: priceorbit
      MARIADB_USER: priceorbit
      MARIADB_PASSWORD: CHANGE_ME
      MARIADB_ROOT_PASSWORD: CHANGE_ME
    volumes:
      # MariaDB's own entrypoint runs as root and chowns the datadir to the
      # mysql user, so a root-owned bind dir is fine (do NOT set `user:` here).
      - ${DATA_ROOT:-/app/priceorbit}/db:/var/lib/mysql
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/fluxden/priceorbit:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: PriceOrbit
      APP_SECRET: CHANGE_ME
      TIMEZONE: UTC
      DB_DRIVER: mysql+pymysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: priceorbit
      DB_USER: priceorbit
      DB_PASSWORD: CHANGE_ME
      # Optional: scrape.do fallback for anti-bot stores (Home Depot, etc.).
      # Easiest to enable on the Settings page instead; this just seeds the token
      # at deploy time. Free tier = 1,000 credits/month (~25 per protected fetch),
      # so keep protected products on an infrequent schedule. https://scrape.do
      # SCRAPEDO_TOKEN: CHANGE_ME
      # Optional: initial log level (fatal|error|warn|info|debug|trace).
      # Also editable at runtime in Admin → Logs.
      # LOG_LEVEL: info
      # Optional: force sign-in mode (lockout recovery). OFF | Standard | OIDC.
      # Overrides the Admin sign-in/OIDC settings; unset to manage from the UI.
      # LOGIN_TYPE: Standard
    ports:
      - "8800:8000"
    networks:
      - proxy
    volumes:
      # Single mount for all app state. The entrypoint runs as root, creates
      # /data/uploads + /data/logs and chowns them to uid 1000, then drops to
      # the non-root app via setpriv -- so a root-owned bind dir is fine here.
      # logs hold app.log (rotated at 2 MB, kept 7 days); uploads is auto-filled.
      - ${DATA_ROOT:-/app/priceorbit}/app:/data

# All persistent state lives under one host dir (override with DATA_ROOT):
#   /app/priceorbit/db   -> MariaDB datadir
#   /app/priceorbit/app  -> app uploads + logs
# Docker auto-creates these as root on first start; both containers self-heal
# ownership, so no manual chown/mkdir is needed.

networks:
  proxy:
    external: true
