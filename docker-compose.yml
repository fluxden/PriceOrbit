services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: priceorbit
      MARIADB_USER: priceorbit
      MARIADB_PASSWORD: CHANGE_ME
      MARIADB_ROOT_PASSWORD: CHANGE_ME
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/fluxden/priceorbit:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: PriceOrbit
      APP_SECRET: CHANGE_ME
      TIMEZONE: UTC
      DB_DRIVER: mysql+pymysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: priceorbit
      DB_USER: priceorbit
      DB_PASSWORD: CHANGE_ME
      # Optional: scrape.do fallback for anti-bot stores (Home Depot, etc.).
      # Easiest to enable on the Settings page instead; this just seeds the token
      # at deploy time. Free tier = 1,000 credits/month (~25 per protected fetch),
      # so keep protected products on an infrequent schedule. https://scrape.do
      # SCRAPEDO_TOKEN: CHANGE_ME
      # Optional: initial log level (fatal|error|warn|info|debug|trace).
      # Also editable at runtime in Admin → Logs.
      # LOG_LEVEL: info
      # Optional: force sign-in mode (lockout recovery). OFF | Standard | OIDC.
      # Overrides the Admin sign-in/OIDC settings; unset to manage from the UI.
      # LOGIN_TYPE: Standard
    ports:
      - "8800:8000"
    networks:
      - proxy
    volumes:
      # Persists app state: uploads (/data/uploads, auto-created) and logs
      # (/data/app.log, rotated at 2 MB, kept 7 days).
      - app_data:/data

volumes:
  db_data:
  app_data:

networks:
  proxy:
    external: true
