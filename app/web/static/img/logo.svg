<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="PriceOrbit">
  <defs>
    <linearGradient id="po" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6F97EA"/>
      <stop offset="1" stop-color="#3A62C2"/>
    </linearGradient>
  </defs>
  <!-- orbit ring -->
  <ellipse cx="16" cy="16" rx="13" ry="6.4" fill="none" stroke="url(#po)" stroke-width="2"
           transform="rotate(-28 16 16)" opacity="0.55"/>
  <!-- planet -->
  <circle cx="16" cy="16" r="6.2" fill="url(#po)"/>
  <!-- coin slit / value mark -->
  <path d="M16 12.4v7.2" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
  <!-- satellite -->
  <circle cx="27" cy="9.7" r="2" fill="#6F97EA"/>
</svg>
